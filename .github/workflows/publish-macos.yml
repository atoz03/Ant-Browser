name: Publish macOS Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Expected package version; defaults to the version declared in this revision
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

concurrency:
  group: publish-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve and verify release version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION_INPUT:-}"
          if [[ -z "$version" && "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#[vV]}"
          fi
          if [[ -z "$version" ]]; then
            version="$(node -p "require('./wails.json').info.productVersion")"
          fi
          wails_version="$(node -p "require('./wails.json').info.productVersion")"
          frontend_version="$(node -p "require('./frontend/package.json').version")"
          [[ "$version" == "$wails_version" && "$version" == "$frontend_version" ]] || {
            echo "version mismatch: requested=$version wails=$wails_version frontend=$frontend_version" >&2
            exit 1
          }
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build unsigned macOS package
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          args=(--arch "${{ matrix.arch }}")
          if [[ -n "$VERSION" ]]; then
            args+=(--version "$VERSION")
          fi
          bash publish/mac/publish-mac.sh "${args[@]}"

      - name: Validate app bundle
        run: |
          set -euo pipefail
          app_path="$(ls -1d publish/output/AntBrowser-*-macos-${{ matrix.arch }}.app | head -n 1)"
          zip_path="$(ls -1 publish/output/AntBrowser-*-macos-${{ matrix.arch }}.zip | head -n 1)"
          echo "Validating: $app_path"
          test -x "$app_path/Contents/MacOS/ant-chrome"
          test -x "$app_path/Contents/MacOS/bin/xray"
          test -x "$app_path/Contents/MacOS/bin/sing-box"
          plutil -lint "$app_path/Contents/Info.plist"
          ditto -x -k "$zip_path" /tmp/ant-browser-macos-validate
          test -x "/tmp/ant-browser-macos-validate/$(basename "$app_path")/Contents/MacOS/ant-chrome"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ant-browser-macos-${{ matrix.arch }}
          path: |
            publish/output/AntBrowser-*-macos-${{ matrix.arch }}.app
            publish/output/AntBrowser-*-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --generate-notes || gh release view "$TAG_NAME" >/dev/null
          fi
          gh release upload "$TAG_NAME" release-artifacts/* --clobber
